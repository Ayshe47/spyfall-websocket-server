name: Build App for All OS

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-numeric-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter Pillow PyInstaller
        # Если у вас есть файл requirements.txt, раскомментируйте строку ниже:
        # pip install -r requirements.txt || true

    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: pyinstaller --onefile --noconsole ui2.py

    - name: Build with PyInstaller (Mac & Linux)
      if: matrix.os != 'windows-latest'
      run: pyinstaller --noconsole ui2.py

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Spyfall-${{ matrix.os }}
        path: dist/