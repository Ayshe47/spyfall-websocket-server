name: Build Multi-Platform Application

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
       
        python-version: '3.11'

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip

        pip install pyinstaller pillow customtkinter websocket-client websockets
        if [ -f requirements-build.txt ]; then pip install -r requirements-build.txt; fi
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Build with PyInstaller
      shell: bash
      run: |
  
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          SEP=";"
        else
          SEP=":"
        fi
   
        pyinstaller --noconfirm --onefile --windowed --name Spyfall \
          --collect-all customtkinter \
          --add-data "*.png${SEP}." \
          --add-data "*.ttf${SEP}." \
          ui2.py

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: spyfall-build-${{ matrix.os }}
        path: dist/
