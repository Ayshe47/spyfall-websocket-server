name: Build Spyfall for Windows, Mac and Linux

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - run: |
        python -m pip install --upgrade pip
        pip install customtkinter pillow websocket-client pyinstaller

    - run: pyinstaller --onedir --name=Spyfall ui2.py

    - run: |
        if (Test-Path "*.png") { copy *.png dist\Spyfall\ }
        if (Test-Path "*.ttf") { copy *.ttf dist\Spyfall\ }

    - uses: actions/upload-artifact@v4
      with:
        name: Spyfall-Windows-Edition
        path: dist/Spyfall/

  build-mac:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - run: |
        python -m pip install --upgrade pip
        pip install customtkinter pillow websocket-client pyinstaller

    - run: pyinstaller --onedir --name=Spyfall ui2.py

    - run: |
        cp *.png dist/Spyfall/ 2>/dev/null || true
        cp *.ttf dist/Spyfall/ 2>/dev/null || true

    - uses: actions/upload-artifact@v4
      with:
        name: Spyfall-Mac-Edition
        path: dist/Spyfall/

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build in Container
      uses: docker://python:3.10-slim-buster
      with:
        args: >
          sh -c "
          echo 'deb http://archive.debian.org/debian buster main' > /etc/apt/sources.list &&
          echo 'deb http://archive.debian.org/debian-security buster/updates main' >> /etc/apt/sources.list &&
          echo 'Acquire::Check-Valid-Until \"false\";' > /etc/apt/apt.conf.d/99no-check-valid-until &&
          apt-get update -o Acquire::Check-Valid-Until=false &&
          apt-get install -y git binutils python3-dev &&
          pip install --upgrade pip &&
          pip install customtkinter pillow websocket-client pyinstaller &&
          pyinstaller --onefile --name=Spyfall ui2.py &&
          cp *.png dist/ 2>/dev/null || true &&
          cp *.ttf dist/ 2>/dev/null || true
          "

    - uses: actions/upload-artifact@v4
      with:
        name: Spyfall-Linux-Mint-Edition
        path: dist/
