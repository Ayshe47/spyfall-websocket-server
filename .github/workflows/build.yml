name: Build Multi-Platform Application

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.os == 'macos-latest' && '3.14' || '3.11' }}

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if [ -f requirements-build.txt ]; then pip install -r requirements-build.txt; fi
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi


    - name: Build with PyInstaller
      shell: bash
      run: |
        if [ "${{ matrix.os }}" = "macos-latest" ]; then
          pyinstaller --noconfirm spy.spec
        else
          pyinstaller --noconfirm --onedir main.py
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: spyfall-build-${{ matrix.os }}
        path: dist/
